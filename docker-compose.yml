name: thegrove

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" \
            -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: >-
        Server=sqlserver,1433;
        Database=TheGroveDB;
        User Id=sa;
        Password=${SA_PASSWORD};
        TrustServerCertificate=True;
        Encrypt=False;
      Jwt__Issuer: "TheGrove.shop"
      Jwt__Audience: "TheGrove.shop"
      Jwt__Key: "${JWT_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5190:8080"
    restart: on-failure

  client:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"

  client-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npx ng serve --host 0.0.0.0 --poll 500"
    volumes:
      - ./src/client:/app
    depends_on:
      - api
    ports:
      - "4201:4200"

volumes:
  sqlserver_data: