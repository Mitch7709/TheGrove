<div class="tabs tabs-border w-full justify-center">
  <input type="radio" name="auth_tabs" class="tab" aria-label="Login" checked />
  <div class="tab-content border-base-300 bg-base-100 p-6 w-full">
    <app-login class="block w-full"></app-login>
  </div>

  <input type="radio" name="auth_tabs" class="tab" aria-label="Register" />
  <div class="tab-content border-base-300 bg-base-100 p-6 w-full">
    <app-register class="block w-full"></app-register>
  </div>
</div>
